services:
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    expose:
      - "3001"
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Persist user-generated config (settings, alert history) across rebuilds
      - sentinel_config:/app/src/config

volumes:
  sentinel_config:
